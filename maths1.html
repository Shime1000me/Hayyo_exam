<script>
    // ============================================
    // MATHEMATICS EXAM - 30 QUESTIONS (Round 1)
    // Based on extracted content from original HU exam
    // FIXED: Navigation now jumps to correct page
    // ============================================

    const questions = [
        // Questions 1-15 (Page 1)
        { text: "A bag contains 5 red, 3 blue, and 2 green marbles. If one marble is drawn at random, which of the following is the probability that it is NOT blue?", options: ["2/5", "3/10", "7/10", "1/2"], correct: 2 },
        { text: "A function f: A → B is onto if:", options: ["The function is invertible", "Every element of A has a unique image in B", "Every element of B is the image of at least one element of A", "Different elements of A map to different elements of B"], correct: 2 },
        { text: "A linear programming problem has constraints: x + y ≤ 5, x ≥ 1, y > 0, x ≤ 4. Which of the following points is NOT in the feasible region?", options: ["(1,4)", "(2,3)", "(4,0)", "(3,2)"], correct: 2 },
        { text: "A school has 5000 students. The principal selects every 20th student from the alphabetical list to participate in a survey. This is an example of:", options: ["Convenience", "Stratified", "Simple random", "Systematic"], correct: 3 },
        { text: "For what value of x is \\(4^{\\log_2(2x - 3)} = x^2 + 9\\) ?", options: ["3/4", "2", "√2", "3/2"], correct: 1 },
        { text: "Given sets A = {x : x is a prime number less than 10} and B = {x : x is an even integer between 2 and 8 inclusive}. Which of the following is true?", options: ["A ∩ B = {2}", "B ⊂ A", "A and B are disjoint", "A ∪ B = {2,3,5,7,4,6}"], correct: 0 },
        { text: "If tan θ = 3/4 and θ is in the first quadrant, which of the following is sin(2θ)?", options: ["24/25", "7/25", "3/5", "12/25"], correct: 0 },
        { text: "If the inverse of the matrix \\(\\begin{pmatrix} 2x & -2x \\\\ -5 & 3x \\end{pmatrix}\\) is \\(\\begin{pmatrix} 3/2 & 1 \\\\ 5/4 & 1 \\end{pmatrix}\\), then which one of the following is the value of x?", options: ["2", "3", "4", "5"], correct: 0 },
        { text: "Let f(x) = 3x^{4/3} - 9x. Then which of the following equals \\(\\frac{f(8+h)-f(8)}{h}\\) as h → 0?", options: ["4", "0 and 4", "2", "3 and 1"], correct: 2 },
        { text: "In a geometric progression, if the 2nd term is 8 and 5th term is -27, then what is the first term?", options: ["-16/3", "12", "8", "-3/16"], correct: 0 },
        { text: "In how many ways can the letters of the word 'HAWASSA' be arranged starting with 'A' and ending with 'W'?", options: ["26", "120", "18", "30"], correct: 2 },
        { text: "In the diagram, points A, B, C lie on a circle center O. ∠BOC = 120° and ∠ACO = 42°. Find ∠ABO.", options: ["20°", "22°", "18°", "24°"], correct: 2 },
        { text: "Which best describes the difference between discrete and continuous data?", options: ["Discrete data can be measured; continuous data can only be counted.", "There is no real difference.", "Continuous data is always quantitative; discrete data is always qualitative.", "Discrete data has gaps between possible values; continuous data does not."], correct: 3 },
        { text: "Let f(x) = x³ + x² + ax + b. When divided by (x-2) remainder is -7, by (x+1) remainder is 32. Find a + b.", options: ["-1", "1/8", "-1/3", "17"], correct: 3 },
        { text: "Let f(x) = √(5-x) and g(x) = x² + 1. What is the domain and range of (f∘g)(x)?", options: ["Domain: [-2,2], Range: [0,2]", "Domain: [-2,2], Range: R", "Domain: R, Range: [0,2]", "Domain: R, Range: R"], correct: 0 },
        
        // Questions 16-30 (Page 2)
        { text: "The absolute maximum value of f(x) = 5x³ - 3x⁵ + 10 on [0,2] is:", options: ["10", "12", "14", "18"], correct: 3 },
        { text: "Which of the following is equal to cos 2θ?", options: ["1-2 sin²θ", "1+ sec²θ", "sin²θ - cos²θ", "2 cos²θ + 1"], correct: 0 },
        { text: "The bases of a frustum of a square pyramid are lengths 10 and 7. Slant height 12. Find total surface area.", options: ["557", "600", "287", "382"], correct: 0 },
        { text: "Vectors u = (1, p, 2) and v = (2, -1, q) are perpendicular and have equal magnitude. Find p+q.", options: ["3", "2", "1", "0"], correct: 1 },
        { text: "Which function has vertical asymptote x=2 and horizontal asymptote y=1?", options: ["(x²+4)/(x²-4)", "(x+1)/(x-2)", "(x²+1)/(x-2)", "(-2x²+2x)/(x+3)"], correct: 1 },
        { text: "For what value of x > 0 does \\(2^{2x+3} - 8(\\sqrt{2})^{2x+1} = 0\\)?", options: ["3/4", "2", "√2", "3/2"], correct: 1 },
        { text: "Find the standard deviation of grouped data: X: 4-8(3), 8-12(6), 12-16(4), 16-20(7)", options: ["4", "8.5", "6", "4.5"], correct: 3 },
        { text: "Which is NOT true about matrix \\(\\begin{pmatrix}3&2&1\\\\1&-1&4\\\\2&0&8\\end{pmatrix}\\)?", options: ["Minor of entry 0 is -22", "Minor of entry -1 is -22", "Cofactor of entry 4 is 4", "Cofactor of entry 2 is 7"], correct: 2 },
        { text: "What is the image of circle (x-2)²+(y+3)²=64 under translation of (-3,2) → (2,3) followed by reflection in x-axis?", options: ["(x+7)²+(y-3)²=64", "(x-7)²+(y-2)²=64", "(x-7)²+(y+2)²=64", "(x+7)²+(y+2)²=64"], correct: 2 },
        { text: "Find the value of \\(\\int_{1}^{4} 5x\\sqrt{x} dx\\)", options: ["62", "62/3", "31", "93"], correct: 0 },
        { text: "Solve \\(\\sqrt{2x+5} - 3x + 9 = 2(x+1) - 5x\\)", options: ["5", "22", "14", "∅"], correct: 2 },
        { text: "Find \\(\\int (x^2 + 1)^2 dx\\)", options: ["63/5", "11/3", "26", "62"], correct: 3 },
        { text: "What is the quartile deviation of: 5,7,9,11,13,15,17,19?", options: ["4", "8.5", "6", "4.5"], correct: 0 },
        { text: "If f(x) = 3x^{4/3} - 9x, find f'(8)", options: ["4", "0 and 4", "2", "3 and 1"], correct: 2 },
        { text: "The expected equation for the given graph (parabola through (-1,3) and (2,0)) is:", options: ["y = -x² + 2x + 4", "y = x² - 2x", "y = -x² + 2x", "y = x² + 2x + 4"], correct: 2 }
    ];

    console.log("Loaded", questions.length, "Mathematics questions");

    let userAnswers = new Array(questions.length).fill(null);
    let flagged = new Array(questions.length).fill(false);
    let currentPage = 0;
    const QUESTIONS_PER_PAGE = 15;
    let timeSeconds = 5400;
    let timerInterval = null;

    const questionsContainer = document.getElementById('questionsContainer');
    const qnButtonsContainer = document.getElementById('qnButtons');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const finishAttemptLink = document.getElementById('finishAttemptLink');
    const quizTimeLeft = document.getElementById('quiz-time-left');
    const quizTimer = document.getElementById('quizTimer');
    const openDrawerBtn = document.getElementById('openDrawerBtn');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const quizDrawer = document.getElementById('quizDrawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const summaryModal = document.getElementById('summaryModal');
    const scoreModal = document.getElementById('scoreModal');
    const logoutBtn = document.getElementById('logoutBtn');

    function formatTime(sec) {
        let hours = Math.floor(sec / 3600);
        let minutes = Math.floor((sec % 3600) / 60);
        let seconds = sec % 60;
        return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }

    function updateTimerDisplay() {
        quizTimeLeft.textContent = formatTime(timeSeconds);
        if (timeSeconds <= 100) {
            quizTimer.classList.add('warning');
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('maths_answers', JSON.stringify(userAnswers));
        localStorage.setItem('maths_flagged', JSON.stringify(flagged));
    }

    function loadFromLocalStorage() {
        let saved = localStorage.getItem('maths_answers');
        if (saved) userAnswers = JSON.parse(saved);
        let savedFlags = localStorage.getItem('maths_flagged');
        if (savedFlags) flagged = JSON.parse(savedFlags);
    }

    function renderQuestions() {
        const start = currentPage * QUESTIONS_PER_PAGE;
        const end = Math.min(start + QUESTIONS_PER_PAGE, questions.length);
        let html = '';

        for (let i = start; i < end; i++) {
            const q = questions[i];
            const userAnswer = userAnswers[i];
            const isFlagged = flagged[i];
            const stateText = userAnswer === null ? 'Not yet answered' : 'Answered';

            html += `
                <div class="que" id="q-${i}">
                    <div class="info">
                        <h3 class="no">Question <span class="qno">${i+1}</span></h3>
                        <div class="state">${stateText}</div>
                        <div class="questionflag editable">
                            <a class="flag-action ${isFlagged ? 'active' : ''}" onclick="toggleFlag(${i})">⚐ ${isFlagged ? 'Remove flag' : 'Flag question'}</a>
                        </div>
                    </div>
                    <div class="content">
                        <div class="qtext">${q.text}</div>
                        <fieldset class="ablock">
                            <div class="answer">
            `;

            q.options.forEach((opt, optIdx) => {
                const checked = (userAnswer === optIdx) ? 'checked' : '';
                const letter = String.fromCharCode(97 + optIdx);
                html += `
                    <div class="r${optIdx % 2 === 0 ? '0' : '1'}">
                        <input type="radio" name="q${i}" value="${optIdx}" id="q${i}_${optIdx}" ${checked} onclick="selectOption(${i}, ${optIdx})">
                        <label for="q${i}_${optIdx}"><span class="answernumber">${letter}. </span>${opt}</label>
                    </div>
                `;
            });

            html += `
                            </div>
                            <div class="qtype_multichoice_clearchoice">
                                <a onclick="clearChoice(${i})">Clear my choice</a>
                            </div>
                        </fieldset>
                    </div>
                </div>
            `;
        }

        questionsContainer.innerHTML = html;
        renderNavButtons();
        updatePageNavButtons();
    }

    function renderNavButtons() {
        qnButtonsContainer.innerHTML = '';
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        
        for (let i = 0; i < questions.length; i++) {
            const isAnswered = userAnswers[i] !== null;
            const isFlagged = flagged[i];
            const targetPage = Math.floor(i / QUESTIONS_PER_PAGE);
            const isOnCurrentPage = (currentPage === targetPage);
            
            let btnClass = 'qnbutton';
            if (isAnswered) btnClass += ' answered';
            if (isFlagged) btnClass += ' flagged';
            if (isOnCurrentPage) btnClass += ' thispage';
            
            const btn = document.createElement('a');
            btn.className = btnClass;
            btn.textContent = (i + 1).toString();
            
            btn.onclick = (function(idx, targetPg) {
                return function() {
                    if (currentPage !== targetPg) {
                        currentPage = targetPg;
                        renderQuestions();
                    }
                    scrollToQuestion(idx);
                    closeDrawer();
                };
            })(i, targetPage);
            
            qnButtonsContainer.appendChild(btn);
        }
    }

    function updatePageNavButtons() {
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        const navDiv = document.getElementById('pageNavButtons');
        if (currentPage === 0) {
            navDiv.innerHTML = `<button class="mod_quiz-next-nav" id="nextPageBtn">Next page</button>`;
            document.getElementById('nextPageBtn').onclick = () => changePage(1);
        } else if (currentPage === totalPages - 1) {
            navDiv.innerHTML = `<button class="mod_quiz-prev-nav" id="prevPageBtn">Previous page</button>`;
            document.getElementById('prevPageBtn').onclick = () => changePage(-1);
        } else {
            navDiv.innerHTML = `
                <button class="mod_quiz-prev-nav" id="prevPageBtn">Previous page</button>
                <button class="mod_quiz-next-nav" id="nextPageBtn">Next page</button>
            `;
            document.getElementById('prevPageBtn').onclick = () => changePage(-1);
            document.getElementById('nextPageBtn').onclick = () => changePage(1);
        }
    }

    window.selectOption = function(qid, optIdx) {
        userAnswers[qid] = optIdx;
        saveToLocalStorage();
        renderQuestions();
    };

    window.clearChoice = function(qid) {
        userAnswers[qid] = null;
        saveToLocalStorage();
        renderQuestions();
    };

    window.toggleFlag = function(qid) {
        flagged[qid] = !flagged[qid];
        saveToLocalStorage();
        renderQuestions();
    };

    function scrollToQuestion(qid) {
        const element = document.getElementById(`q-${qid}`);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    function changePage(delta) {
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        const newPage = currentPage + delta;
        if (newPage >= 0 && newPage < totalPages) {
            currentPage = newPage;
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            closeDrawer();
        }
    }

    function openDrawer() {
        quizDrawer.classList.add('open');
        drawerOverlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
        quizDrawer.classList.remove('open');
        drawerOverlay.classList.remove('show');
        document.body.style.overflow = '';
    }

    openDrawerBtn.onclick = openDrawer;
    closeDrawerBtn.onclick = closeDrawer;
    drawerOverlay.onclick = closeDrawer;

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeSeconds <= 0) {
                clearInterval(timerInterval);
                quizTimeLeft.textContent = "00:00:00";
                alert("Time is up! Submitting your exam...");
                showSummary();
            } else {
                timeSeconds--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function calculateScore() {
        let correct = 0;
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                correct++;
            }
        }
        return { correct, total: questions.length, percentage: Math.round((correct / questions.length) * 100) };
    }

    function showSummary() {
        if (timerInterval) clearInterval(timerInterval);
        let summaryHtml = '';
        for (let i = 0; i < questions.length; i++) {
            const isAnswered = userAnswers[i] !== null;
            const isCorrect = isAnswered && userAnswers[i] === questions[i].correct;
            let statusClass = '';
            let statusText = '';
            if (!isAnswered) {
                statusClass = 'summary-wrong';
                statusText = 'Not answered';
            } else if (isCorrect) {
                statusClass = 'summary-correct';
                statusText = 'Correct';
            } else {
                statusClass = 'summary-wrong';
                statusText = 'Wrong';
            }
            summaryHtml += `
                <div class="summary-item" onclick="goToQuestionAndClose(${i})">
                    <strong>Question ${i+1}</strong>: <span class="${statusClass}">${statusText}</span>
                </div>
            `;
        }
        document.getElementById('summaryList').innerHTML = summaryHtml;
        summaryModal.style.display = 'flex';
        closeDrawer();
    }
    
    function goToQuestionAndClose(qid) {
        const targetPage = Math.floor(qid / QUESTIONS_PER_PAGE);
        if (currentPage !== targetPage) {
            currentPage = targetPage;
            renderQuestions();
        }
        scrollToQuestion(qid);
        summaryModal.style.display = 'none';
        startTimer();
        closeDrawer();
    }

    function showFinalScore() {
        const score = calculateScore();
        let wrongList = '';
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] === null || userAnswers[i] !== questions[i].correct) {
                const status = userAnswers[i] === null ? 'Not answered' : 'Wrong';
                const correctLetter = String.fromCharCode(97 + questions[i].correct);
                wrongList += `<li>Q${i+1}: ${status} (Correct: ${correctLetter}. ${questions[i].options[questions[i].correct]})</li>`;
            }
        }
        document.getElementById('scoreDetails').innerHTML = `
            <p style="font-size: 1.5rem; text-align: center;"><strong>${score.correct}/${score.total}</strong> (${score.percentage}%)</p>
            <hr>
            <p><strong>Review:</strong></p>
            <ul style="max-height: 300px; overflow-y: auto;">${wrongList || '<li>Perfect score! All correct!</li>'}</ul>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #6a737b;">This is a practice exam. Your answers are saved locally.</p>
        `;
        summaryModal.style.display = 'none';
        scoreModal.style.display = 'flex';
    }

    finishAttemptLink.onclick = (e) => {
        e.preventDefault();
        showSummary();
    };

    document.getElementById('cancelSummaryBtn').onclick = () => {
        summaryModal.style.display = 'none';
        startTimer();
    };

    document.getElementById('submitFinalBtn').onclick = showFinalScore;
    document.getElementById('closeScoreBtn').onclick = () => {
        scoreModal.style.display = 'none';
    };

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    logoutBtn.onclick = logout;

    function checkLogin() {
        const loggedIn = localStorage.getItem('hayyo_logged_in');
        if (!loggedIn || loggedIn !== 'true') {
            window.location.href = 'index.html';
        }
    }

    function init() {
        checkLogin();
        loadFromLocalStorage();
        renderQuestions();
        updateTimerDisplay();
        startTimer();
    }

    init();

    window.addEventListener('beforeunload', function(e) {
        const answered = userAnswers.filter(a => a !== null).length;
        if (answered > 0 && answered < questions.length && timeSeconds > 0) {
            e.preventDefault();
            e.returnValue = 'You have unsaved answers. Are you sure you want to leave?';
            return e.returnValue;
        }
    });
</script>
</body>
</html>
