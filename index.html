<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hayyo Academy - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Login Container - Matching original HU Moodle style */
        .login-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .login-container {
            background: white;
            border-radius: 0.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
        }

        /* Logo Section */
        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo h1 {
            font-size: 1.8rem;
            color: #0f6cbf;
            margin-bottom: 0.25rem;
        }

        .login-logo p {
            color: #6a737b;
            font-size: 0.85rem;
        }

        /* Form Elements */
        .login-form {
            margin-top: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #1d2125;
        }

        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-input-wrapper input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid #8f959e;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-align: center;
        }

        .password-input-wrapper input:focus {
            outline: none;
            border-color: #0f6cbf;
            box-shadow: 0 0 0 0.2rem rgba(15,108,191,0.25);
        }

        /* Toggle password visibility button */
        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: #6a737b;
            padding: 0.25rem;
        }

        .toggle-password:hover {
            color: #0f6cbf;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #0f6cbf;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #094478;
        }

        .login-btn:disabled {
            background: #8f959e;
            cursor: not-allowed;
        }

        /* Error Message */
        .error-message {
            background: #f4d6d2;
            color: #ca3120;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Loading Spinner */
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e9ecef;
            border-top-color: #0f6cbf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #dee2e6;
            font-size: 0.7rem;
            color: #6a737b;
        }

        /* Help text */
        .help-text {
            font-size: 0.7rem;
            color: #6a737b;
            text-align: center;
            margin-top: 1rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }
            .login-logo h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-logo">
                <h1>🏫 Hayyo Academy</h1>
                <p>online ESSLCE-equivalent exam practice portal</p>
            </div>

            <div class="error-message" id="errorMessage">
                Invalid password. Please check and try again.
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="password">Enter 10-digit password</label>
                    <div class="password-input-wrapper">
                        <input type="password" 
                               id="password" 
                               name="password" 
                               maxlength="10" 
                               minlength="10" 
                               pattern="[0-9]{10}" 
                               inputmode="numeric"
                               placeholder="••••••••••"
                               autocomplete="off"
                               required>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Log in</button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem;">Verifying...</p>
                </div>
            </form>

            <div class="help-text">
                <p>Your 10-digit password was provided by your instructor.</p>
            </div>

            <div class="login-footer">
                <p>© 2026 Hayyo Academy</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // LOGIN PAGE - Validates against passwords.json
        // ============================================
        
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const togglePasswordBtn = document.getElementById('togglePassword');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Allow only numbers
        passwordInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
        });

        // Remove error when user starts typing
        passwordInput.addEventListener('input', function() {
            errorMessage.classList.remove('show');
        });

        // Handle form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            
            // Validate length
            if (password.length !== 10) {
                errorMessage.textContent = 'Password must be exactly 10 digits.';
                errorMessage.classList.add('show');
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loading.classList.add('show');
            errorMessage.classList.remove('show');

            try {
                // Load passwords.json
                const response = await fetch('passwords.json');
                
                if (!response.ok) {
                    throw new Error('Could not load passwords file. Please contact administrator.');
                }
                
                const data = await response.json();
                
                // Check if password exists in the list
                let isValid = false;
                
                if (Array.isArray(data)) {
                    // Format: ["1234567890", "0987654321", ...]
                    isValid = data.includes(password);
                } else if (data.passwords && Array.isArray(data.passwords)) {
                    // Format: { "passwords": ["1234567890", ...] }
                    isValid = data.passwords.includes(password);
                } else if (data.validPasswords && Array.isArray(data.validPasswords)) {
                    // Format: { "validPasswords": ["1234567890", ...] }
                    isValid = data.validPasswords.includes(password);
                }
                
                if (isValid) {
                    // Store password in localStorage to maintain session
                    localStorage.setItem('hayyo_logged_in', 'true');
                    localStorage.setItem('hayyo_password', password);
                    localStorage.setItem('hayyo_login_time', Date.now().toString());
                    
                    // Redirect to rounds page
                    window.location.href = 'rounds.html';
                } else {
                    errorMessage.textContent = 'Invalid password. Please check and try again.';
                    errorMessage.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Unable to verify password. Please check your connection and try again.';
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loading.classList.remove('show');
            }
        });

        // Check if already logged in (optional)
        function checkExistingSession() {
            const loggedIn = localStorage.getItem('hayyo_logged_in');
            const loginTime = localStorage.getItem('hayyo_login_time');
            
            if (loggedIn === 'true' && loginTime) {
                const timeSinceLogin = Date.now() - parseInt(loginTime);
                const SESSION_DURATION = 8 * 60 * 60 * 1000; // 8 hours
                
                if (timeSinceLogin < SESSION_DURATION) {
                    // Session still valid, redirect to rounds
                    window.location.href = 'rounds.html';
                } else {
                    // Session expired, clear storage
                    localStorage.removeItem('hayyo_logged_in');
                    localStorage.removeItem('hayyo_password');
                    localStorage.removeItem('hayyo_login_time');
                }
            }
        }
        
        // Uncomment to enable auto-redirect for returning users
        // checkExistingSession();
    </script>
</body>
</html>
