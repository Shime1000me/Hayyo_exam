    const questions = [
        // Questions 1-15
        { text: "Which statement is NOT part of the accepted cell theory?", options: ["All living organisms are made up of cells", "Cells arise spontaneously from non-living matter", "Cells are structural and functional units of life", "Cells arise from pre-existing cells by division"], correct: 1 },
        { text: "Which of the following is an example of active transport?", options: ["Diffusion of oxygen into the lungs", "Movement of water into plant roots by osmosis", "Uptake of mineral ions by root hair cells", "Loss of carbon dioxide from leaves"], correct: 2 },
        { text: "Match the phyla of kingdom Protista with the correct organism. (Ciliata, Rhizopoda, Flagellata, Sporozoa)", options: ["i-c, ii-a, iii-b, iv-d", "i-b, ii-c, iii-d, iv-a", "i-d, ii-b, iii-a, iv-c", "i-a, ii-d, iii-c, iv-b"], correct: 0 },

        { text: "Who is known for extensive research on parasitic diseases, public health, and infectious diseases in Ethiopia?", options: ["Prof. Tilahun Yilma", "Prof. Beyene Petros", "Dr. Zeresenay Alemseged", "Prof. Ensermu Kelbesa"], correct: 1 },
        { text: "Why is ethanol used in the process of testing a leaf for starch?", options: ["To supply oxygen for respiration", "To remove water from the leaf", "To extract chlorophyll so that iodine color change can be observed clearly", "To break down starch into simpler sugars"], correct: 2 },
        { text: "Which combination of the following statements is correct about plant growth responses?", options: ["(ii) and (iv)", "(i) and (ii)", "(iii) and (v)", "(i) and (v)"], correct: 2 },
        { text: "The reaction of plant Y is caused by growth hormones that...", options: ["form only in the presence of light.", "cannot function in the dark.", "stimulate cell elongation on the shaded sides.", "Inhibit cell division of the lighted side."], correct: 2 },
        { text: "Match the carbohydrates with their correct functions. (Starch, Cellulose, Glycogen, Chitin)", options: ["i-a, ii-c, iii-d, iv-b", "i-a, ii-b, iii-c, iv-d", "i-b, ii-c, iii-d, iv-a", "i-b, ii-d, iii-a, iv-c"], correct: 3 },

        { text: "Why is fat emulsification considered physical digestion?", options: ["Because it breaks chemical bonds in fat molecules", "Because it converts fats into glucose using enzymes", "Because it breaks large fat globules into smaller droplets", "Because it changes fat into amino acids"], correct: 2 },

        // Questions 16-30
        { text: "Select one of the following that is an accurate statement concerning ecosystems.", options: ["Energy flow tends to be from the sun, to producers, then consumers, and finally back to the sun.", "Energy flow from trophic level to trophic level is 90% efficient.", "Energy may only flow from the biotic to the abiotic portions of ecosystems.", "Some energy lost during transfers from trophic level to trophic level is in the form of heat."], correct: 3 },
        { text: "The diagram shows the carbon cycle. What are the processes represented by X and Y respectively?", options: ["Photosynthesis and respiration", "Photosynthesis and decomposition", "Respiration and photosynthesis", "Respiration and decomposition"], correct: 1 },
        { text: "Match the types of bacteria with their correct reactions.", options: ["i-d, ii-b, iii-a, iv-c, v-e", "i-b, ii-d, iii-a, iv-c, v-e", "i-d, ii-a, iii-b, iv-c, v-e", "i-d, ii-b, iii-c, iv-a, v-e"], correct: 0 },
        { text: "What does a pregnancy urine test detect?", options: ["The presence of glucose levels in blood for diabetes diagnosis", "The level of oxygen in blood circulation for respiratory analysis", "The hormone Human Chorionic Gonadotropin (HCG) in urine or blood to confirm pregnancy", "The presence of HIV antibodies in the bloodstream for infection detection"], correct: 2 },

        { text: "Which of the following best describes the structure of a virus?", options: ["A cellular organism with a nucleus", "An acellular structure with a protein coat and nucleic acid", "A prokaryotic cell with a cell wall", "A multicellular organism with organelles"], correct: 1 },
        { text: "Non-cyclic phosphorylation differs from cyclic photophosphorylation in that the former:", options: ["involves only PS I", "Include evolution of O₂", "involves formation of assimilatory power", "both 'B' and 'C'"], correct: 3 },
        { text: "For fixing one molecule of CO₂ in Calvin cycle are required:", options: ["3ATP + 1NADPH₂", "3ATP + 2NADPH₂", "2ATP + 3NADPH₂", "3ATP + 3NADPH₂"], correct: 1 },
        { text: "During the process of glycolysis, if fructose-6-phosphate is used as substrate instead of glucose, how many net ATP will be gained?", options: ["1", "2", "3", "4"], correct: 2 },
        { text: "Which one of the following compounds is formed by the decarboxylase enzyme during TCA cycle?", options: ["Citrate", "α-ketoglutarate", "Isocitrate", "Cis-aconitate"], correct: 1 },
        { text: "Single turn of Krebs cycle yields:", options: ["4NADH₂, 2 FADH₂ and 2 GTP", "4NADH₂, 1 FADH₂ and 2 GTP", "3NADH₂, 1 FADH₂ and 2 GTP", "3NADH₂, 1 FADH₂ and 1 GTP"], correct: 3 },
        { text: "The half-life of a radioactive isotope refers to:", options: ["The time required for all atoms to completely decay", "The time it takes for fossils to form in rocks", "The time required for half of the parent isotopes to decay into daughter isotopes", "The time needed for sediment layers to harden into rock"], correct: 2 },
        { text: "Potassium-argon dating is especially useful for:", options: ["Dating very recent fossils less than 1,000 years old", "Dating rocks that are millions of years old using radioactive potassium decay", "Studying DNA sequences in living organisms", "Measuring carbon ratios in fresh biological samples"], correct: 1 },
        { text: "Two species that are active at different times of day will likely be isolated due to:", options: ["Temporal isolation", "Mechanical isolation", "Hybrid breakdown", "Gametic incompatibility"], correct: 0 },
        { text: "Which of the following is NOT true about genetic drift?", options: ["Can cause harmful alleles to become fixed", "Can cause allele frequency not to change at random", "Significant in small populations", "Can lead to a loss of genetic variation within populations"], correct: 1 },
        { text: "What is the primary role of glial (supporting) cells in the nervous system?", options: ["Conduct electrical impulses rapidly", "Generate motor responses", "Support, protect, and nourish neurons", "Produce neurotransmitters only"], correct: 2 },
        { text: "Resting potential refers to the condition when:", options: ["A neuron is actively transmitting signals", "A neuron is not conducting any impulse and is in a polarized state", "The neuron is releasing neurotransmitters", "The neuron has equal ion distribution inside and outside"], correct: 1 },
        { text: "In what order does the filtrate pass through the following structures of the nephron?", options: ["1,3,4,2,5", "2,1,3,4", "2,3,1,4,5", "4,3,1,2,5"], correct: 3 }
    ];

    console.log("Loaded", questions.length, "Biology questions");

    let userAnswers = new Array(questions.length).fill(null);
    let flagged = new Array(questions.length).fill(false);
    let currentPage = 0;
    const QUESTIONS_PER_PAGE = 15;
    let timeSeconds = 5400;
    let timerInterval = null;

    const questionsContainer = document.getElementById('questionsContainer');
    const qnButtonsContainer = document.getElementById('qnButtons');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const finishAttemptLink = document.getElementById('finishAttemptLink');
    const quizTimeLeft = document.getElementById('quiz-time-left');
    const quizTimer = document.getElementById('quizTimer');
    const openDrawerBtn = document.getElementById('openDrawerBtn');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const quizDrawer = document.getElementById('quizDrawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const summaryModal = document.getElementById('summaryModal');
    const scoreModal = document.getElementById('scoreModal');
    const logoutBtn = document.getElementById('logoutBtn');

    function formatTime(sec) {
        let hours = Math.floor(sec / 3600);
        let minutes = Math.floor((sec % 3600) / 60);
        let seconds = sec % 60;
        return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }

    function updateTimerDisplay() {
        quizTimeLeft.textContent = formatTime(timeSeconds);
        if (timeSeconds <= 100) {
            quizTimer.classList.add('warning');
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('biology_answers', JSON.stringify(userAnswers));
        localStorage.setItem('biology_flagged', JSON.stringify(flagged));
    }

    function loadFromLocalStorage() {
        let saved = localStorage.getItem('biology_answers');
        if (saved) userAnswers = JSON.parse(saved);
        let savedFlags = localStorage.getItem('biology_flagged');
        if (savedFlags) flagged = JSON.parse(savedFlags);
    }

    function renderQuestions() {
        const start = currentPage * QUESTIONS_PER_PAGE;
        const end = Math.min(start + QUESTIONS_PER_PAGE, questions.length);
        let html = '';

        for (let i = start; i < end; i++) {
            const q = questions[i];
            const userAnswer = userAnswers[i];
            const isFlagged = flagged[i];
            const stateText = userAnswer === null ? 'Not yet answered' : 'Answered';

            html += `
                <div class="que" id="q-${i}">
                    <div class="info">
                        <h3 class="no">Question <span class="qno">${i+1}</span></h3>
                        <div class="state">${stateText}</div>
                        <div class="questionflag editable">
                            <a class="flag-action ${isFlagged ? 'active' : ''}" onclick="toggleFlag(${i})">⚐ ${isFlagged ? 'Remove flag' : 'Flag question'}</a>
                        </div>
                    </div>
                    <div class="content">
                        <div class="qtext">${q.text}</div>
                        <fieldset class="ablock">
                            <div class="answer">
            `;

            q.options.forEach((opt, optIdx) => {
                const checked = (userAnswer === optIdx) ? 'checked' : '';
                const letter = String.fromCharCode(97 + optIdx);
                html += `
                    <div class="r${optIdx % 2 === 0 ? '0' : '1'}">
                        <input type="radio" name="q${i}" value="${optIdx}" id="q${i}_${optIdx}" ${checked} onclick="selectOption(${i}, ${optIdx})">
                        <label for="q${i}_${optIdx}"><span class="answernumber">${letter}. </span>${opt}</label>
                    </div>
                `;
            });

            html += `
                            </div>
                            <div class="qtype_multichoice_clearchoice">
                                <a onclick="clearChoice(${i})">Clear my choice</a>
                            </div>
                        </fieldset>
                    </div>
                </div>
            `;
        }

        questionsContainer.innerHTML = html;
        renderNavButtons();
        updatePageNavButtons();
    }

    function renderNavButtons() {
        qnButtonsContainer.innerHTML = '';
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        
        for (let i = 0; i < questions.length; i++) {
            const isAnswered = userAnswers[i] !== null;
            const isFlagged = flagged[i];
            const targetPage = Math.floor(i / QUESTIONS_PER_PAGE);
            const isOnCurrentPage = (currentPage === targetPage);
            
            let btnClass = 'qnbutton';
            if (isAnswered) btnClass += ' answered';
            if (isFlagged) btnClass += ' flagged';
            if (isOnCurrentPage) btnClass += ' thispage';
            
            const btn = document.createElement('a');
            btn.className = btnClass;
            btn.textContent = (i + 1).toString();
            
            btn.onclick = (function(idx, targetPg) {
                return function() {
                    if (currentPage !== targetPg) {
                        currentPage = targetPg;
                        renderQuestions();
                    }
                    scrollToQuestion(idx);
                    closeDrawer();
                };
            })(i, targetPage);
            
            qnButtonsContainer.appendChild(btn);
        }
    }

    function updatePageNavButtons() {
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        const navDiv = document.getElementById('pageNavButtons');
        if (currentPage === 0) {
            navDiv.innerHTML = `<button class="mod_quiz-next-nav" id="nextPageBtn">Next page</button>`;
            document.getElementById('nextPageBtn').onclick = () => changePage(1);
        } else if (currentPage === totalPages - 1) {
            navDiv.innerHTML = `<button class="mod_quiz-prev-nav" id="prevPageBtn">Previous page</button>`;
            document.getElementById('prevPageBtn').onclick = () => changePage(-1);
        } else {
            navDiv.innerHTML = `
                <button class="mod_quiz-prev-nav" id="prevPageBtn">Previous page</button>
                <button class="mod_quiz-next-nav" id="nextPageBtn">Next page</button>
            `;
            document.getElementById('prevPageBtn').onclick = () => changePage(-1);
            document.getElementById('nextPageBtn').onclick = () => changePage(1);
        }
    }

    window.selectOption = function(qid, optIdx) {
        userAnswers[qid] = optIdx;
        saveToLocalStorage();
        renderQuestions();
    };

    window.clearChoice = function(qid) {
        userAnswers[qid] = null;
        saveToLocalStorage();
        renderQuestions();
    };

    window.toggleFlag = function(qid) {
        flagged[qid] = !flagged[qid];
        saveToLocalStorage();
        renderQuestions();
    };

    function scrollToQuestion(qid) {
        const element = document.getElementById(`q-${qid}`);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    function changePage(delta) {
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        const newPage = currentPage + delta;
        if (newPage >= 0 && newPage < totalPages) {
            currentPage = newPage;
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            closeDrawer();
        }
    }

    function openDrawer() {
        quizDrawer.classList.add('open');
        drawerOverlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
        quizDrawer.classList.remove('open');
        drawerOverlay.classList.remove('show');
        document.body.style.overflow = '';
    }

    openDrawerBtn.onclick = openDrawer;
    closeDrawerBtn.onclick = closeDrawer;
    drawerOverlay.onclick = closeDrawer;

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeSeconds <= 0) {
                clearInterval(timerInterval);
                quizTimeLeft.textContent = "00:00:00";
                alert("Time is up! Submitting your exam...");
                showSummary();
            } else {
                timeSeconds--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function calculateScore() {
        let correct = 0;
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                correct++;
            }
        }
        return { correct, total: questions.length, percentage: Math.round((correct / questions.length) * 100) };
    }

    function showSummary() {
        if (timerInterval) clearInterval(timerInterval);
        let summaryHtml = '';
        for (let i = 0; i < questions.length; i++) {
            const isAnswered = userAnswers[i] !== null;
            const isCorrect = isAnswered && userAnswers[i] === questions[i].correct;
            let statusClass = '';
            let statusText = '';
            if (!isAnswered) {
                statusClass = 'summary-wrong';
                statusText = 'Not answered';
            } else if (isCorrect) {
                statusClass = 'summary-correct';
                statusText = 'Correct';
            } else {
                statusClass = 'summary-wrong';
                statusText = 'Wrong';
            }
            summaryHtml += `
                <div class="summary-item" onclick="goToQuestionAndClose(${i})">
                    <strong>Question ${i+1}</strong>: <span class="${statusClass}">${statusText}</span>
                </div>
            `;
        }
        document.getElementById('summaryList').innerHTML = summaryHtml;
        summaryModal.style.display = 'flex';
        closeDrawer();
    }
    
    function goToQuestionAndClose(qid) {
        const targetPage = Math.floor(qid / QUESTIONS_PER_PAGE);
        if (currentPage !== targetPage) {
            currentPage = targetPage;
            renderQuestions();
        }
        scrollToQuestion(qid);
        summaryModal.style.display = 'none';
        startTimer();
        closeDrawer();
    }

    function showFinalScore() {
        const score = calculateScore();
        let wrongList = '';
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] === null || userAnswers[i] !== questions[i].correct) {
                const status = userAnswers[i] === null ? 'Not answered' : 'Wrong';
                const correctLetter = String.fromCharCode(97 + questions[i].correct);
                wrongList += `<li>Q${i+1}: ${status} (Correct: ${correctLetter}. ${questions[i].options[questions[i].correct]})</li>`;
            }
        }
        document.getElementById('scoreDetails').innerHTML = `
            <p style="font-size: 1.5rem; text-align: center;"><strong>${score.correct}/${score.total}</strong> (${score.percentage}%)</p>
            <hr>
            <p><strong>Review:</strong></p>
            <ul style="max-height: 300px; overflow-y: auto;">${wrongList || '<li>Perfect score! All correct!</li>'}</ul>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #6a737b;">This is a practice exam. Your answers are saved locally.</p>
        `;
        summaryModal.style.display = 'none';
        scoreModal.style.display = 'flex';
    }

    finishAttemptLink.onclick = (e) => {
        e.preventDefault();
        showSummary();
    };

    document.getElementById('cancelSummaryBtn').onclick = () => {
        summaryModal.style.display = 'none';
        startTimer();
    };

    document.getElementById('submitFinalBtn').onclick = showFinalScore;
    document.getElementById('closeScoreBtn').onclick = () => {
        scoreModal.style.display = 'none';
    };

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    logoutBtn.onclick = logout;

    function checkLogin() {
        const loggedIn = localStorage.getItem('hayyo_logged_in');
        if (!loggedIn || loggedIn !== 'true') {
            window.location.href = 'index.html';
        }
    }

    function init() {
        checkLogin();
        loadFromLocalStorage();
        renderQuestions();
        updateTimerDisplay();
        startTimer();
    }

    init();

    window.addEventListener('beforeunload', function(e) {
        const answered = userAnswers.filter(a => a !== null).length;
        if (answered > 0 && answered < questions.length && timeSeconds > 0) {
            e.preventDefault();
            e.returnValue = 'You have unsaved answers. Are you sure you want to leave?';
            return e.returnValue;
        }
    });
</script>
</body>
</html>
