        { text: "Which one of the following substances conducts electricity due to the presence of free electrons?", options: ["Copper metal", "Nitric acid solution", "Molten sodium chloride", "Hydrochloric acid solution"], correct: 0 },
        { text: "Which process is used to produce Diammonium Phosphate (DAP)?", options: ["Reacting phosphoric acid with ammonia", "Reacting sulfuric acid with phosphate rock", "Mixing potassium chloride with ammonium sulfate", "Reacting nitric acid with phosphate rock"], correct: 0 },
        { text: "Which reagent is commonly used to prepare ethers by Williamson synthesis?", options: ["Alcohol and alkyl halide", "Phenol and acid", "Alkene and water", "Carboxylic acid and alcohol"], correct: 0 },
        
        // Questions 46-60
        { text: "Which type of glass is made of pure silica, possesses an extremely high melting point, and allows ultraviolet light to pass through it?", options: ["Potash-lime glass", "Quartz glass", "Soda-lime glass", "Borosilicate glass"], correct: 1 },
        { text: "Why does a buffer solution resist pH changes upon the addition of a strong acid?", options: ["The conjugate acid neutralizes the added (H⁺) ions", "The weak acid reacts with the added (OH⁻) ions", "The conjugate base neutralizes the added (H⁺) ions", "The water in the buffer instantly decomposes the acid"], correct: 2 },
        { text: "The electronegativities of four elements are given: W=0.9, X=3.0, Y=4.0, Z=2.0. Which statement is CORRECT?", options: ["W and X form an ionic compound.", "W and X form a covalent compound.", "Y and Z form an ionic compound.", "Y and Z form a covalent compound."], correct: 0 },
        { text: "A 0.25M solution of a weak acid HA is 3% ionized at 25°C. What is the Ka value?", options: ["2.3 × 10⁻⁴", "4.5 × 10⁻⁵", "1.2 × 10⁻³", "6.7 × 10⁻⁴"], correct: 0 },
        { text: "Calculate the value of dissociation constant of weak monoprotic acid if it dissociates to 2% in 0.1 M solution?", options: ["4 × 10⁻⁵", "6 × 10⁻⁵", "2 × 10⁻⁵", "1 × 10⁻⁵"], correct: 0 },
        { text: "An aqueous solution containing a concentration of 2.5 × 10⁻⁸ OH⁻ ions will have a pH of which of the following?", options: ["4.40", "6.42", "7.40", "7.60"], correct: 2 },
        { text: "Two cells are connected in series. One contains CuSO₄ solution and the other contains Al₂(SO₄)₃ solution. If 45g of Al is deposited, how much copper is deposited? (Cu=64, Al=27)", options: ["320g", "160g", "180g", "16g"], correct: 1 },
        { text: "What is the correct IUPAC name for the compound 3,4-dimethylhexane?", options: ["3,4-dimethylhexane", "2-ethyl-3-methylpentane", "3-methyl-4-ethylpentane", "2,3-diethylbutane"], correct: 0 },
        { text: "What is the IUPAC name of the compound 2-Chloro-5-hydroxy hexane?", options: ["2-Chloro-5-hydroxy hexane", "5-chlorohexane-2-ol", "2-chlorohexan-5-ol", "5-hydroxy-2-chloro hexane"], correct: 0 },
        { text: "Three functional groups found in a compound are:", options: ["Alcohol, Aromatic, and Ether", "Alcohol, Aldehyde, and Ether", "Alcohol, Ether, and Ketone", "Aldehyde, Ether, and Carboxylic acid"], correct: 0 },
        { text: "The structure of a polymer is shown. The systematic name of the alkene monomer that forms this polymer is:", options: ["2-methyl-3-ethylpropene", "2-methylpent-2-ene", "2-methylpent-3-ene", "4-methylpent-2-ene"], correct: 1 },
        { text: "Which alcohol can be oxidized by K₂Cr₂O₇ and H₂SO₄ to form a ketone?", options: ["2-propanol", "2-butanol", "2-methyl-2-propanol", "1-propanol"], correct: 0 },
        { text: "Which of the following reactions represents a redox-reaction?", options: ["AgNO₃ + NaCl → AgCl + NaNO₃", "Zn + CuSO₄ → ZnSO₄ + Cu", "NaOH + HCl → NaCl + H₂O", "CaCO₃ → CaO + CO₂"], correct: 1 },
        { text: "What is the correct IUPAC name for the following compound? (image of chemical structure)", options: ["3,4-dimethylhexane", "2-ethyl-3-methylpentane", "3-methyl-4-ethylpentane", "2,3-diethylbutane"], correct: 0 },
        { text: "In the reaction, identify the conjugate acid-base pairs", options: ["H₃O⁺ and H₂O", "HPO₄²⁻ and H₃O⁺", "H₂O and OH⁻", "HPO₄²⁻ and PO₄³⁻"], correct: 0 }
    ];

    console.log("Loaded", questions.length, "Chemistry questions");

    let userAnswers = new Array(questions.length).fill(null);
    let flagged = new Array(questions.length).fill(false);
    let currentPage = 0;
    const QUESTIONS_PER_PAGE = 15;
    let timeSeconds = 5400;
    let timerInterval = null;

    const questionsContainer = document.getElementById('questionsContainer');
    const qnButtonsContainer = document.getElementById('qnButtons');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const finishAttemptLink = document.getElementById('finishAttemptLink');
    const quizTimeLeft = document.getElementById('quiz-time-left');
    const quizTimer = document.getElementById('quizTimer');
    const openDrawerBtn = document.getElementById('openDrawerBtn');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');
    const quizDrawer = document.getElementById('quizDrawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const summaryModal = document.getElementById('summaryModal');
    const scoreModal = document.getElementById('scoreModal');
    const logoutBtn = document.getElementById('logoutBtn');

    function formatTime(sec) {
        let hours = Math.floor(sec / 3600);
        let minutes = Math.floor((sec % 3600) / 60);
        let seconds = sec % 60;
        return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }

    function updateTimerDisplay() {
        quizTimeLeft.textContent = formatTime(timeSeconds);
        if (timeSeconds <= 100) {
            quizTimer.classList.add('warning');
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem('chemistry_answers', JSON.stringify(userAnswers));
        localStorage.setItem('chemistry_flagged', JSON.stringify(flagged));
    }

    function loadFromLocalStorage() {
        let saved = localStorage.getItem('chemistry_answers');
        if (saved) userAnswers = JSON.parse(saved);
        let savedFlags = localStorage.getItem('chemistry_flagged');
        if (savedFlags) flagged = JSON.parse(savedFlags);
    }

    function renderQuestions() {
        const start = currentPage * QUESTIONS_PER_PAGE;
        const end = Math.min(start + QUESTIONS_PER_PAGE, questions.length);
        let html = '';

        for (let i = start; i < end; i++) {
            const q = questions[i];
            const userAnswer = userAnswers[i];
            const isFlagged = flagged[i];
            const stateText = userAnswer === null ? 'Not yet answered' : 'Answered';

            html += `
                <div class="que" id="q-${i}">
                    <div class="info">
                        <h3 class="no">Question <span class="qno">${i+1}</span></h3>
                        <div class="state">${stateText}</div>
                        <div class="questionflag editable">
                            <a class="flag-action ${isFlagged ? 'active' : ''}" onclick="toggleFlag(${i})">⚐ ${isFlagged ? 'Remove flag' : 'Flag question'}</a>
                        </div>
                    </div>
                    <div class="content">
                        <div class="qtext">${q.text}</div>
                        <fieldset class="ablock">
                            <div class="answer">
            `;

            q.options.forEach((opt, optIdx) => {
                const checked = (userAnswer === optIdx) ? 'checked' : '';
                const letter = String.fromCharCode(97 + optIdx);
                html += `
                    <div class="r${optIdx % 2 === 0 ? '0' : '1'}">
                        <input type="radio" name="q${i}" value="${optIdx}" id="q${i}_${optIdx}" ${checked} onclick="selectOption(${i}, ${optIdx})">
                        <label for="q${i}_${optIdx}"><span class="answernumber">${letter}. </span>${opt}</label>
                    </div>
                `;
            });

            html += `
                            </div>
                            <div class="qtype_multichoice_clearchoice">
                                <a onclick="clearChoice(${i})">Clear my choice</a>
                            </div>
                        </fieldset>
                    </div>
                </div>
            `;
        }

        questionsContainer.innerHTML = html;
        renderNavButtons();
        updatePageNavButtons();
    }

    function renderNavButtons() {
        qnButtonsContainer.innerHTML = '';
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        
        for (let i = 0; i < questions.length; i++) {
            const isAnswered = userAnswers[i] !== null;
            const isFlagged = flagged[i];
            const targetPage = Math.floor(i / QUESTIONS_PER_PAGE);
            const isOnCurrentPage = (currentPage === targetPage);
            
            let btnClass = 'qnbutton';
            if (isAnswered) btnClass += ' answered';
            if (isFlagged) btnClass += ' flagged';
            if (isOnCurrentPage) btnClass += ' thispage';
            
            const btn = document.createElement('a');
            btn.className = btnClass;
            btn.textContent = (i + 1).toString();
            
            btn.onclick = (function(idx, targetPg) {
                return function() {
                    if (currentPage !== targetPg) {
                        currentPage = targetPg;
                        renderQuestions();
                    }
                    scrollToQuestion(idx);
                    closeDrawer();
                };
            })(i, targetPage);
            
            qnButtonsContainer.appendChild(btn);
        }
    }

    function updatePageNavButtons() {
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        const navDiv = document.getElementById('pageNavButtons');
        if (currentPage === 0) {
            navDiv.innerHTML = `<button class="mod_quiz-next-nav" id="nextPageBtn">Next page</button>`;
            document.getElementById('nextPageBtn').onclick = () => changePage(1);
        } else if (currentPage === totalPages - 1) {
            navDiv.innerHTML = `<button class="mod_quiz-prev-nav" id="prevPageBtn">Previous page</button>`;
            document.getElementById('prevPageBtn').onclick = () => changePage(-1);
        } else {
            navDiv.innerHTML = `
                <button class="mod_quiz-prev-nav" id="prevPageBtn">Previous page</button>
                <button class="mod_quiz-next-nav" id="nextPageBtn">Next page</button>
            `;
            document.getElementById('prevPageBtn').onclick = () => changePage(-1);
            document.getElementById('nextPageBtn').onclick = () => changePage(1);
        }
    }

    window.selectOption = function(qid, optIdx) {
        userAnswers[qid] = optIdx;
        saveToLocalStorage();
        renderQuestions();
    };

    window.clearChoice = function(qid) {
        userAnswers[qid] = null;
        saveToLocalStorage();
        renderQuestions();
    };

    window.toggleFlag = function(qid) {
        flagged[qid] = !flagged[qid];
        saveToLocalStorage();
        renderQuestions();
    };

    function scrollToQuestion(qid) {
        const element = document.getElementById(`q-${qid}`);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    function changePage(delta) {
        const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
        const newPage = currentPage + delta;
        if (newPage >= 0 && newPage < totalPages) {
            currentPage = newPage;
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            closeDrawer();
        }
    }

    function openDrawer() {
        quizDrawer.classList.add('open');
        drawerOverlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
        quizDrawer.classList.remove('open');
        drawerOverlay.classList.remove('show');
        document.body.style.overflow = '';
    }

    openDrawerBtn.onclick = openDrawer;
    closeDrawerBtn.onclick = closeDrawer;
    drawerOverlay.onclick = closeDrawer;

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timeSeconds <= 0) {
                clearInterval(timerInterval);
                quizTimeLeft.textContent = "00:00:00";
                alert("Time is up! Submitting your exam...");
                showSummary();
            } else {
                timeSeconds--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function calculateScore() {
        let correct = 0;
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                correct++;
            }
        }
        return { correct, total: questions.length, percentage: Math.round((correct / questions.length) * 100) };
    }

    function showSummary() {
        if (timerInterval) clearInterval(timerInterval);
        let summaryHtml = '';
        for (let i = 0; i < questions.length; i++) {
            const isAnswered = userAnswers[i] !== null;
            const isCorrect = isAnswered && userAnswers[i] === questions[i].correct;
            let statusClass = '';
            let statusText = '';
            if (!isAnswered) {
                statusClass = 'summary-wrong';
                statusText = 'Not answered';
            } else if (isCorrect) {
                statusClass = 'summary-correct';
                statusText = 'Correct';
            } else {
                statusClass = 'summary-wrong';
                statusText = 'Wrong';
            }
            summaryHtml += `
                <div class="summary-item" onclick="goToQuestionAndClose(${i})">
                    <strong>Question ${i+1}</strong>: <span class="${statusClass}">${statusText}</span>
                </div>
            `;
        }
        document.getElementById('summaryList').innerHTML = summaryHtml;
        summaryModal.style.display = 'flex';
        closeDrawer();
    }
    
    function goToQuestionAndClose(qid) {
        const targetPage = Math.floor(qid / QUESTIONS_PER_PAGE);
        if (currentPage !== targetPage) {
            currentPage = targetPage;
            renderQuestions();
        }
        scrollToQuestion(qid);
        summaryModal.style.display = 'none';
        startTimer();
        closeDrawer();
    }

    function showFinalScore() {
        const score = calculateScore();
        let wrongList = '';
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] === null || userAnswers[i] !== questions[i].correct) {
                const status = userAnswers[i] === null ? 'Not answered' : 'Wrong';
                const correctLetter = String.fromCharCode(97 + questions[i].correct);
                wrongList += `<li>Q${i+1}: ${status} (Correct: ${correctLetter}. ${questions[i].options[questions[i].correct]})</li>`;
            }
        }
        document.getElementById('scoreDetails').innerHTML = `
            <p style="font-size: 1.5rem; text-align: center;"><strong>${score.correct}/${score.total}</strong> (${score.percentage}%)</p>
            <hr>
            <p><strong>Review:</strong></p>
            <ul style="max-height: 300px; overflow-y: auto;">${wrongList || '<li>Perfect score! All correct!</li>'}</ul>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #6a737b;">This is a practice exam. Your answers are saved locally.</p>
        `;
        summaryModal.style.display = 'none';
        scoreModal.style.display = 'flex';
    }

    finishAttemptLink.onclick = (e) => {
        e.preventDefault();
        showSummary();
    };

    document.getElementById('cancelSummaryBtn').onclick = () => {
        summaryModal.style.display = 'none';
        startTimer();
    };

    document.getElementById('submitFinalBtn').onclick = showFinalScore;
    document.getElementById('closeScoreBtn').onclick = () => {
        scoreModal.style.display = 'none';
    };

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    logoutBtn.onclick = logout;

    function checkLogin() {
        const loggedIn = localStorage.getItem('hayyo_logged_in');
        if (!loggedIn || loggedIn !== 'true') {
            window.location.href = 'index.html';
        }
    }

    function init() {
        checkLogin();
        loadFromLocalStorage();
        renderQuestions();
        updateTimerDisplay();
        startTimer();
    }

    init();

    window.addEventListener('beforeunload', function(e) {
        const answered = userAnswers.filter(a => a !== null).length;
        if (answered > 0 && answered < questions.length && timeSeconds > 0) {
            e.preventDefault();
            e.returnValue = 'You have unsaved answers. Are you sure you want to leave?';
            return e.returnValue;
        }
    });
</script>
</body>
</html>
